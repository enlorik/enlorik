name: cute-merge-bot

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild trophy table
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/update-upstream.sh

      - name: Commit if changed
        run: |
          if git diff --quiet README.md; then
            echo "no new trophies today"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update merged upstream table"
          git push
